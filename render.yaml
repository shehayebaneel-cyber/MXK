# Render Blueprint — deploys the MXK API + website.
# In Render: New → Blueprint → connect this repo. Then set the secret env vars
# marked "sync: false" (DATABASE_URL, ADMIN_EMAIL, ADMIN_PASSWORD) in the dashboard.
services:
  # ---- API (Express + Prisma + Neon) ----
  - type: web
    name: mxk-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false # paste the Neon connection string in the dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: MXK
      - key: FRONTEND_URL
        value: https://mxk-web.onrender.com
      # Stripe — leave blank until MXK is ready to take card payments.
      # With no STRIPE_SECRET_KEY, ticketing falls back to reserve/RSVP.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NODE_VERSION
        value: "22.11.0"

  # ---- Website (React/Vite static site) ----
  - type: web
    name: mxk-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://mxk-api.onrender.com
      - key: NODE_VERSION
        value: "22.11.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
